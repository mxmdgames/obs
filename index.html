<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeckMap Mobile – OBS Stream Deck with QR</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c10;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: #1e1f24;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        .conn-panel {
            background: #2c2e3a;
            border-radius: 60px;
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .conn-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 3;
        }

        .conn-fields input {
            background: #0f1117;
            border: none;
            padding: 10px 12px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            flex: 1;
            min-width: 100px;
            outline: none;
            font-family: monospace;
        }

        .conn-fields input::placeholder {
            color: #6c6f7e;
        }

        button {
            background: #3b3e4e;
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s ease;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.96);
            background: #5a5f77;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #00000066;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 12px;
            background: #6b6f8a;
        }
        .led.connected { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .led.disconnected { background: #e74c3c; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: #2c2e3a;
            flex: 1;
            font-size: 0.8rem;
        }
        .toolbar .edit-active {
            background: #f39c12;
            color: #1e1f24;
        }

        .deck {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            aspect-ratio: 5 / 3;
            margin-bottom: 20px;
        }

        .deck-btn {
            background: #2d2f3a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 12px 4px;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 6px 0 #121317;
            touch-action: manipulation;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }
        .deck-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #121317;
        }
        .deck-btn .icon {
            font-size: 2rem;
            margin-bottom: 6px;
        }
        .deck-btn .label {
            font-size: 0.7rem;
            background: #00000055;
            padding: 2px 8px;
            border-radius: 20px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .empty-btn {
            background: #1b1d25;
            box-shadow: 0 4px 0 #0b0d12;
            color: #5e627a;
        }
        .empty-btn:active {
            transform: translateY(1px);
        }

        .edit-hint {
            text-align: center;
            font-size: 0.7rem;
            color: #f39c12;
            margin-top: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-card {
            background: #1e1f24;
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            color: white;
            text-align: center;
        }
        #qr-reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
        }
        .close-modal {
            background: #e74c3c;
            width: 100%;
            margin-top: 12px;
        }
        .action-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 20px 0;
            max-height: 60vh;
            overflow-y: auto;
        }
        .action-item {
            background: #2c2e3a;
            padding: 12px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .action-icon { font-size: 1.8rem; }
        .action-name { font-weight: bold; flex:1; }
        .action-desc { font-size: 0.7rem; color: #aaa; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s ease;
        }
        .toast.fade { opacity: 0; }

        @media (orientation: portrait) {
            .app { max-width: 500px; }
            .deck-btn .icon { font-size: 1.5rem; }
            .deck-btn .label { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="conn-panel">
        <div class="conn-fields">
            <input type="text" id="host" placeholder="IP / hostname" value="localhost">
            <input type="text" id="port" placeholder="Port" value="4455">
            <input type="password" id="password" placeholder="Password (optional)">
        </div>
        <button id="scanQrBtn">📷 Scan QR</button>
        <button id="connectBtn">🔌 Connect</button>
        <div class="status">
            <div class="led" id="statusLed"></div>
            <span id="statusText">Offline</span>
        </div>
    </div>

    <div class="toolbar">
        <button id="editToggleBtn">✏️ Edit Mode OFF</button>
        <button id="clearAllBtn">🗑️ Clear all</button>
        <button id="saveConfigBtn">💾 Save config</button>
        <button id="loadConfigBtn">📂 Load config</button>
    </div>

    <div class="deck" id="deckGrid"></div>
    <div id="editHint" class="edit-hint" style="display:none;">✨ Tap any button to assign an action ✨</div>

    <!-- Action assignment modal -->
    <div id="actionModal" class="modal">
        <div class="modal-card">
            <h3>Assign action</h3>
            <div id="actionListContainer" class="action-list">Loading...</div>
            <button class="close-modal" id="closeModalBtn">Cancel</button>
        </div>
    </div>

    <!-- QR scanner modal -->
    <div id="qrModal" class="modal">
        <div class="modal-card">
            <h3>📷 Scan QR Code</h3>
            <div id="qr-reader"></div>
            <button id="closeQrModalBtn" class="close-modal">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ── OBS WebSocket client ──────────────────────────────────────────────────
    let ws = null;
    let connected = false;
    let obsConfig = { host: "localhost", port: 4455, password: "" };
    let currentMessageId = 0;
    let pendingRequests = new Map();

    let scenes = [];
    let audioInputs = [];

    const staticActions = {
        "obs_start_record":  { icon: "⏺", label: "Start Recording" },
        "obs_stop_record":   { icon: "⏹", label: "Stop Recording"  },
        "obs_start_stream":  { icon: "📡", label: "Start Stream"    },
        "obs_stop_stream":   { icon: "📴", label: "Stop Stream"     },
        "obs_save_replay":   { icon: "✂",  label: "Save Replay"     },
        "obs_toggle_mic":    { icon: "🎙️", label: "Toggle Mic"      }
    };

    let deckButtons = new Array(15).fill(null);
    let editMode = false;

    // ── Crypto helpers ────────────────────────────────────────────────────────
    // OBS WebSocket v5 auth:
    //   secret   = base64( sha256( password + salt ) )
    //   authStr  = base64( sha256( secret + challenge ) )
    async function sha256Base64(str) {
        const data = new TextEncoder().encode(str);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return btoa(String.fromCharCode(...new Uint8Array(hash)));
    }

    // ── WebSocket helpers ─────────────────────────────────────────────────────
    function sendRequest(requestType, requestData = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return Promise.reject(new Error("Not connected"));
        const msgId = ++currentMessageId;
        ws.send(JSON.stringify({ op: 6, d: { requestType, requestId: String(msgId), requestData } }));
        return new Promise((resolve, reject) => {
            pendingRequests.set(msgId, { resolve, reject });
            setTimeout(() => {
                if (pendingRequests.has(msgId)) {
                    pendingRequests.delete(msgId);
                    reject(new Error("Timeout"));
                }
            }, 5000);
        });
    }

    async function handleMessage(data) {
        const msg = JSON.parse(data);

        if (msg.op === 0) { // Hello — server sends auth challenge
            const authInfo = msg.d.authentication;
            if (authInfo && obsConfig.password) {
                const secret  = await sha256Base64(obsConfig.password + authInfo.salt);
                const authStr = await sha256Base64(secret + authInfo.challenge);
                ws.send(JSON.stringify({ op: 1, d: { rpcVersion: 1, authentication: authStr } }));
            } else {
                ws.send(JSON.stringify({ op: 1, d: { rpcVersion: 1 } }));
            }
        }
        else if (msg.op === 2) { // Identified — connection ready
            connected = true;
            updateUIStatus();
            refreshObsData();
        }
        else if (msg.op === 7) { // RequestResponse
            const reqId = parseInt(msg.d.requestId, 10);
            const pending = pendingRequests.get(reqId);
            if (pending) {
                pendingRequests.delete(reqId);
                if (msg.d.requestStatus?.result === false) {
                    pending.reject(new Error(msg.d.requestStatus.comment || "Request failed"));
                } else {
                    pending.resolve(msg.d.responseData || {});
                }
            }
        }
    }

    function connectWebSocket() {
        if (ws) { try { ws.close(); } catch(_) {} ws = null; }
        connected = false;
        updateUIStatus();

        const host     = document.getElementById("host").value.trim() || "localhost";
        const port     = document.getElementById("port").value.trim() || "4455";
        const password = document.getElementById("password").value;
        obsConfig = { host, port, password };

        ws = new WebSocket(`ws://${host}:${port}`);
        ws.onmessage = (e) => handleMessage(e.data);
        ws.onerror   = ()  => { connected = false; updateUIStatus(); showToast("⚠️ Connection error"); };
        ws.onclose   = ()  => { connected = false; updateUIStatus(); ws = null; };
    }

    async function refreshObsData() {
        if (!connected) return;
        try {
            const sceneResp = await sendRequest("GetSceneList");
            if (sceneResp?.scenes) {
                scenes = sceneResp.scenes.map(s => ({ name: s.sceneName }));
            }
        } catch(e) { console.warn("GetSceneList failed:", e); }

        try {
            const inputsResp = await sendRequest("GetInputList");
            if (inputsResp?.inputs) {
                // Accept any input whose kind contains common audio keywords
                audioInputs = inputsResp.inputs.filter(inp => {
                    const k = (inp.inputKind || "").toLowerCase();
                    return k.includes("wasapi") || k.includes("pulse") || k.includes("coreaudio") ||
                           k.includes("alsa")   || k.includes("audio") || k.includes("mic")     ||
                           k.includes("capture");
                }).map(inp => ({ name: inp.inputName }));
            }
        } catch(e) { console.warn("GetInputList failed:", e); }
    }

    async function executeAction(actionId) {
        if (!connected) { showToast("⚠️ Not connected to OBS"); return; }
        try {
            if      (actionId.startsWith("scene_"))       { await sendRequest("SetCurrentProgramScene", { sceneName: actionId.slice(6) }); showToast("🎬 Scene switched"); }
            else if (actionId.startsWith("mute_"))        { await sendRequest("ToggleInputMute",        { inputName: actionId.slice(5) }); showToast("🔇 Mute toggled"); }
            else if (actionId === "obs_start_record")     { await sendRequest("StartRecord");            showToast("⏺ Recording started"); }
            else if (actionId === "obs_stop_record")      { await sendRequest("StopRecord");             showToast("⏹ Recording stopped"); }
            else if (actionId === "obs_start_stream")     { await sendRequest("StartStream");            showToast("📡 Stream started"); }
            else if (actionId === "obs_stop_stream")      { await sendRequest("StopStream");             showToast("📴 Stream stopped"); }
            else if (actionId === "obs_save_replay")      { await sendRequest("SaveReplayBuffer");       showToast("✂ Replay saved"); }
            else if (actionId === "obs_toggle_mic") {
                if (audioInputs.length) { await sendRequest("ToggleInputMute", { inputName: audioInputs[0].name }); showToast("🎙️ Mic toggled"); }
                else showToast("⚠️ No audio inputs found");
            }
            else showToast("⚠️ Unknown action: " + actionId);
        } catch(e) { showToast("❌ " + e.message); }
    }

    // ── UI helpers ────────────────────────────────────────────────────────────
    function updateUIStatus() {
        const led  = document.getElementById("statusLed");
        const text = document.getElementById("statusText");
        led.className  = "led " + (connected ? "connected" : "disconnected");
        text.innerText = connected ? "Connected to OBS" : "Disconnected";
    }

    function renderDeck() {
        const container = document.getElementById("deckGrid");
        container.innerHTML = "";
        for (let i = 0; i < 15; i++) {
            const btn    = deckButtons[i];
            const btnDiv = document.createElement("div");
            btnDiv.className = "deck-btn" + (btn ? "" : " empty-btn");
            btnDiv.innerHTML = btn
                ? `<div class="icon">${btn.icon}</div><div class="label">${btn.label}</div>`
                : `<div class="icon">❓</div><div class="label">empty</div>`;
            btnDiv.addEventListener("click", (e) => {
                e.stopPropagation();
                if (editMode)      openAssignModal(i);
                else if (btn)      executeAction(btn.actionId);
                else               showToast("Enable edit mode to assign actions");
            });
            container.appendChild(btnDiv);
        }
    }

    function openAssignModal(index) {
        if (!connected) { showToast("⚠️ Connect to OBS first"); return; }
        const modal     = document.getElementById("actionModal");
        const container = document.getElementById("actionListContainer");
        let html = "";

        if (scenes.length) {
            html += `<div style="margin:5px 0 4px;font-size:0.8rem;color:#f39c12;">🎬 SCENES</div>`;
            scenes.forEach(scene => {
                const action = { actionId: "scene_" + scene.name, icon: "🎬", label: scene.name };
                html += actionItemHtml(action, "Switch scene");
            });
        }

        if (audioInputs.length) {
            html += `<div style="margin:10px 0 4px;font-size:0.8rem;color:#f39c12;">🎤 AUDIO (mute toggle)</div>`;
            audioInputs.forEach(inp => {
                const action = { actionId: "mute_" + inp.name, icon: "🔇", label: inp.name };
                html += actionItemHtml(action, "Toggle mute");
            });
        }

        html += `<div style="margin:10px 0 4px;font-size:0.8rem;color:#f39c12;">⚙️ OBS COMMANDS</div>`;
        for (const [id, def] of Object.entries(staticActions)) {
            const action = { actionId: id, icon: def.icon, label: def.label };
            html += actionItemHtml(action, id);
        }

        container.innerHTML = html;
        container.querySelectorAll(".action-item").forEach(el => {
            el.addEventListener("click", () => {
                const action = JSON.parse(el.getAttribute("data-action"));
                deckButtons[index] = {
                    actionId: action.actionId,
                    icon:     action.icon,
                    label:    action.label.length > 18 ? action.label.slice(0, 15) + "…" : action.label
                };
                renderDeck();
                modal.style.display = "none";
                persistConfig();
            });
        });
        modal.style.display = "flex";
    }

    function actionItemHtml(action, desc) {
        const safe = escapeHtml(action.label);
        const data = escapeHtml(JSON.stringify(action));
        return `<div class="action-item" data-action='${data}'>
            <div class="action-icon">${action.icon}</div>
            <div><div class="action-name">${safe}</div><div class="action-desc">${escapeHtml(desc)}</div></div>
        </div>`;
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
    }

    function toggleEditMode() {
        editMode = !editMode;
        const btn  = document.getElementById("editToggleBtn");
        const hint = document.getElementById("editHint");
        btn.innerText = editMode ? "✅ Edit Mode ON" : "✏️ Edit Mode OFF";
        btn.classList.toggle("edit-active", editMode);
        hint.style.display = editMode ? "block" : "none";
    }

    // ── Persistence (no alert spam) ───────────────────────────────────────────
    function persistConfig() {
        try {
            localStorage.setItem("deckmap_config", JSON.stringify({
                deck:       deckButtons.map(b => b ? { actionId: b.actionId, icon: b.icon, label: b.label } : null),
                connection: obsConfig
            }));
        } catch(e) { console.warn("Save failed:", e); }
    }

    function saveLocalConfig() {
        persistConfig();
        showToast("💾 Config saved");
    }

    function loadLocalConfig(silent = false) {
        const raw = localStorage.getItem("deckmap_config");
        if (!raw) { if (!silent) showToast("No saved config found"); return; }
        try {
            const data = JSON.parse(raw);
            if (Array.isArray(data.deck) && data.deck.length === 15) {
                deckButtons = data.deck.map(b => b ? { actionId: b.actionId, icon: b.icon, label: b.label } : null);
            }
            if (data.connection) {
                document.getElementById("host").value     = data.connection.host     || "localhost";
                document.getElementById("port").value     = data.connection.port     || "4455";
                document.getElementById("password").value = data.connection.password || "";
                obsConfig = data.connection;
            }
            renderDeck();
            if (!silent) showToast("📂 Config loaded");
        } catch(e) { if (!silent) showToast("⚠️ Could not parse saved config"); }
    }

    function clearAll() {
        if (!confirm("Clear all button assignments?")) return;
        deckButtons.fill(null);
        renderDeck();
        persistConfig();
        showToast("🗑️ Cleared");
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
        let toast = document.querySelector(".toast");
        if (!toast) {
            toast = document.createElement("div");
            toast.className = "toast";
            document.body.appendChild(toast);
        }
        toast.classList.remove("fade");
        toast.innerText = msg;
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.add("fade");
            setTimeout(() => toast.remove(), 400);
            toastTimer = null;
        }, 1800);
    }

    // ── QR scanner ────────────────────────────────────────────────────────────
    let html5QrCode = null;

    async function startQrScanner() {
        const qrModal   = document.getElementById("qrModal");
        const readerDiv = document.getElementById("qr-reader");
        readerDiv.innerHTML = "";
        qrModal.style.display = "flex";
        html5QrCode = new Html5Qrcode("qr-reader");
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    html5QrCode.stop().catch(() => {});
                    qrModal.style.display = "none";
                    applyQrData(decodedText);
                }
            );
        } catch(err) {
            console.error("QR error", err);
            qrModal.style.display = "none";
            showToast("⚠️ Cannot access camera — check permissions");
        }
    }

    function applyQrData(data) {
        try {
            let host = "", port = "", password = "";
            if (data.trim().startsWith("{")) {
                const parsed = JSON.parse(data);
                host     = parsed.host     || "";
                port     = parsed.port     || "";
                password = parsed.password !== undefined ? parsed.password : "";
            } else {
                // Format: host:port  or  host:port:password
                const parts = data.split(":");
                if (parts.length < 2) throw new Error("Unrecognized format");
                host     = parts[0];
                port     = parts[1];
                password = parts.slice(2).join(":");
            }
            if (host) document.getElementById("host").value     = host;
            if (port) document.getElementById("port").value     = port;
                      document.getElementById("password").value = password;
            showToast("✅ QR applied — connecting…");
            connectWebSocket(); // uses updated field values
        } catch(e) {
            showToast("⚠️ Invalid QR data");
            console.warn("QR parse error:", e, "data:", data);
        }
    }

    function closeQrModal() {
        if (html5QrCode) html5QrCode.stop().catch(() => {});
        document.getElementById("qrModal").style.display = "none";
    }

    // ── Event listeners ───────────────────────────────────────────────────────
    document.getElementById("connectBtn")    .addEventListener("click", connectWebSocket);
    document.getElementById("scanQrBtn")     .addEventListener("click", startQrScanner);
    document.getElementById("editToggleBtn") .addEventListener("click", toggleEditMode);
    document.getElementById("clearAllBtn")   .addEventListener("click", clearAll);
    document.getElementById("saveConfigBtn") .addEventListener("click", saveLocalConfig);
    document.getElementById("loadConfigBtn") .addEventListener("click", () => loadLocalConfig(false));
    document.getElementById("closeModalBtn") .addEventListener("click", () => document.getElementById("actionModal").style.display = "none");
    document.getElementById("closeQrModalBtn").addEventListener("click", closeQrModal);

    window.addEventListener("click", (e) => {
        if (e.target === document.getElementById("actionModal")) document.getElementById("actionModal").style.display = "none";
        if (e.target === document.getElementById("qrModal"))     closeQrModal();
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    loadLocalConfig(true);  // silent on startup
    renderDeck();
    // Auto-connect if credentials are present
    setTimeout(() => {
        if (document.getElementById("host").value && document.getElementById("port").value) {
            connectWebSocket();
        }
    }, 150);
</script>
</body>
</html>
